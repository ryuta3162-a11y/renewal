<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renewal Studio — リニューアル設計</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
</head>
<body>
  <div class="studio">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">R</span>
        <div>
          <strong>Renewal Studio</strong>
        </div>
      </div>

      <div class="topbar-group">
        <label class="topbar-label">案
          <select id="project-select"></select>
        </label>
        <button class="btn btn-ghost btn-xs" id="btn-import-proposal" title="リニューアル案を取り込み">＋ 案</button>
        <label class="topbar-label">図面
          <select id="drawing-select"></select>
        </label>
        <button class="btn btn-ghost btn-sm" id="btn-prev-page" disabled>←</button>
        <span id="page-info" class="page-info">—</span>
        <button class="btn btn-ghost btn-sm" id="btn-next-page" disabled>→</button>
      </div>

      <div class="topbar-group tools">
        <button class="tool-btn" data-tool="select" title="選択・図面クリックでサイズ変更 (V)">↖ 選択</button>
        <button class="tool-btn active" data-tool="zone" title="角をクリックして線で区画を囲む (Z)">⬡ 区画</button>
        <button class="tool-btn" data-tool="pan" title="図面をドラッグして移動 (H)">✋ 移動</button>
        <details class="tool-more">
          <summary>その他</summary>
          <div class="tool-more-inner">
            <button class="tool-btn" data-tool="pen" title="フリーハンド (P)">✏ ペン</button>
            <button class="tool-btn" data-tool="line" title="直線">／ 線</button>
          </div>
        </details>
      </div>

      <div class="topbar-group draw-style">
        <span class="topbar-label mini zone-active-label"><span id="zone-active-label">FW</span></span>
        <label class="topbar-label mini snap-label"><input type="checkbox" id="snap-grid" checked /> 吸着</label>
      </div>

      <div class="topbar-group">
        <button class="btn btn-ghost btn-sm" id="btn-zoom-out">−</button>
        <button class="btn btn-ghost btn-sm" id="btn-zoom-fit">全体</button>
        <button class="btn btn-ghost btn-sm" id="btn-zoom-in">＋</button>
        <button class="btn btn-ghost btn-sm" id="btn-undo">↩</button>
        <button class="btn btn-primary btn-sm" id="btn-save">保存</button>
        <button class="btn btn-primary btn-sm" id="btn-export">PNG</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="palette-panel zone-sidebar">
        <div class="panel-header-row">
          <div class="panel-title">区分</div>
          <div class="hook-toolbar">
            <button type="button" class="btn btn-ghost btn-xs" id="btn-hooks-expand-all" title="展開">＋</button>
            <button type="button" class="btn btn-ghost btn-xs" id="btn-hooks-collapse-all" title="折畳">−</button>
          </div>
        </div>
        <div class="zone-custom-section">
          <div class="panel-header-row">
            <span class="panel-title sub">自作</span>
            <button type="button" class="btn btn-primary btn-xs" id="btn-add-zone-preset">＋ 追加</button>
          </div>
          <div id="zone-custom-hooks" class="zone-hooks zone-hooks-compact"></div>
        </div>
        <div class="zone-hooks-divider"><span>標準区分</span></div>
        <div id="zone-hooks" class="zone-hooks"></div>
        <div class="marks-panel" id="marks-panel">
          <div class="panel-header-row">
            <span class="panel-title sub">記号</span>
          </div>
          <div id="marks-palette" class="marks-grid"></div>
        </div>
        <button class="btn btn-danger btn-block" id="btn-clear-zones">区画クリア</button>
      </aside>

      <div class="canvas-area">
        <div id="canvas-wrap" class="canvas-wrap">
          <canvas id="design-canvas"></canvas>
          <div id="memo-tooltip" class="memo-tooltip" hidden></div>
          <div id="zone-tooltip" class="zone-tooltip" hidden></div>
          <div id="draw-dim-hud" class="draw-dim-hud" hidden>横 — 縦 —</div>
          <div id="zone-place-hud" class="zone-place-hud" hidden>
            <button type="button" class="btn btn-primary btn-xs zone-place-confirm" id="btn-zone-place-confirm">Enter</button>
            <button type="button" class="btn btn-ghost btn-xs" id="btn-zone-place-cancel">Esc</button>
          </div>
          <div id="scale-calib-hud" class="scale-calib-hud">
            <span class="scale-calib-done-line" id="scale-calib-done-line" hidden aria-hidden="true"></span>
            <span class="scale-calib-done-text" id="scale-calib-done-text" hidden>完了</span>
            <span class="scale-calib-summary" id="scale-calib-summary" hidden></span>
            <input type="number" id="scale-known-tsubo" class="scale-calib-input" placeholder="坪" min="0.01" step="0.01" inputmode="decimal" title="坪" />
            <button type="button" class="btn btn-primary btn-xs" id="btn-area-calibrate">縦横採寸</button>
            <button type="button" class="btn btn-primary btn-xs" id="btn-scale-apply" hidden>確定</button>
            <button type="button" class="btn btn-ghost btn-xs" id="btn-scale-cancel" hidden>取消</button>
            <span class="scale-badge tentative" id="scale-badge">未設定</span>
            <button type="button" class="btn btn-ghost btn-xs scale-calib-close" id="btn-scale-hud-close" hidden title="閉じる">×</button>
          </div>
          <button type="button" class="scale-calib-fab" id="scale-calib-fab" hidden title="初期測定">○</button>
        </div>
        <footer id="status" class="status-bar"></footer>
      </div>

      <aside class="props-panel">
        <div class="panel-title">プロパティ</div>
        <div id="props-content">
          <p class="props-empty">—</p>
        </div>
        <div id="props-form" hidden>
          <label class="prop-field">名称
            <input type="text" id="prop-label" />
          </label>
          <div class="prop-row">
            <label class="prop-field">幅 (px)
              <input type="number" id="prop-width" min="10" />
            </label>
            <label class="prop-field">高さ (px)
              <input type="number" id="prop-height" min="10" />
            </label>
          </div>
          <div class="prop-row">
            <label class="prop-field">実寸 幅 (mm)
              <input type="text" id="prop-mm-w" placeholder="例: 1200" />
            </label>
            <label class="prop-field">実寸 高 (mm)
              <input type="text" id="prop-mm-h" placeholder="例: 800" />
            </label>
          </div>
          <div class="prop-row">
            <label class="prop-field">塗り色
              <input type="color" id="prop-fill" />
            </label>
            <label class="prop-field">枠色
              <input type="color" id="prop-stroke" />
            </label>
          </div>
          <label class="prop-field">回転
            <input type="range" id="prop-rotation" min="0" max="360" value="0" />
            <span id="prop-rotation-val" class="prop-val">0°</span>
          </label>
        </div>
        <button class="btn btn-ghost btn-block" id="btn-delete">削除</button>
      </aside>
    </div>
  </div>

  <!-- リニューアル案取込 -->
  <dialog id="proposal-modal" class="modal">
    <form id="proposal-form" method="dialog">
      <header class="modal-header">
        <h3>リニューアル案を取り込み</h3>
        <button type="button" class="btn-close" data-close>×</button>
      </header>
      <div class="modal-body">
        <label class="prop-field">案の名称 <span class="req">*</span>
          <input type="text" id="proposal-name" required placeholder="例：田中案・2025春" />
        </label>
        <label class="prop-field">作成者
          <input type="text" id="proposal-author" placeholder="任意" />
        </label>
        <label class="prop-field">画像ファイル <span class="req">*</span>
          <input type="file" id="proposal-image" accept="image/*,.pdf" required />
        </label>
      </div>
      <footer class="modal-footer">
        <button type="button" class="btn btn-ghost" data-close>キャンセル</button>
        <button type="submit" class="btn btn-primary">取り込む</button>
      </footer>
    </form>
  </dialog>

  <!-- 自作区分の登録 -->
  <dialog id="custom-preset-modal" class="modal">
    <form id="custom-preset-form" method="dialog">
      <header class="modal-header">
        <h3 id="custom-preset-modal-title">自作区分を追加</h3>
        <button type="button" class="btn-close" data-close>×</button>
      </header>
      <div class="modal-body">
        <label class="prop-field">区分名 <span class="req">*</span>
          <input type="text" id="custom-preset-name" required placeholder="例：サーキットエリア" />
        </label>
        <div class="prop-row">
          <label class="prop-field">色
            <input type="color" id="custom-preset-color" value="#a78bfa" />
          </label>
          <label class="prop-field">透明度
            <input type="range" id="custom-preset-opacity" min="0.1" max="0.9" step="0.05" value="0.3" />
          </label>
        </div>
        <label class="prop-field">メモ（任意）
          <input type="text" id="custom-preset-desc" placeholder="用途の説明など" />
        </label>
      </div>
      <footer class="modal-footer">
        <button type="button" class="btn btn-danger" id="custom-preset-delete" hidden>削除</button>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close>キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </footer>
    </form>
  </dialog>

  <!-- 区画タップ時：修正 or 削除 -->
  <dialog id="zone-action-modal" class="modal modal-compact">
    <header class="modal-header">
      <h3 id="zone-action-title">区画</h3>
      <button type="button" class="btn-close" data-close>×</button>
    </header>
    <div class="modal-body">
      <p id="zone-action-memo" class="zone-action-memo"></p>
      <div class="zone-action-buttons">
        <button type="button" class="btn btn-primary" id="zone-action-edit">✎ 修正</button>
        <button type="button" class="btn btn-danger zone-delete-btn" id="zone-action-delete" title="区画を削除">🗑 削除</button>
      </div>
    </div>
  </dialog>

  <!-- 区画メモ（修正用） -->
  <dialog id="zone-modal" class="modal">
    <form id="zone-form" method="dialog">
      <header class="modal-header">
        <h3>区画メモ</h3>
        <button type="button" class="btn-close" data-close>×</button>
      </header>
      <div class="modal-body">
        <label class="prop-field">エリア名 <span class="req">*</span>
          <input type="text" id="zone-name" required placeholder="例：FWエリア" />
        </label>
        <label class="prop-field">メモ
          <textarea id="zone-memo" rows="4" placeholder="面積感、用途、制約、要望など"></textarea>
        </label>
      </div>
      <footer class="modal-footer">
        <button type="button" class="btn btn-danger" id="zone-delete" hidden>区画を削除</button>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close>キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </footer>
    </form>
  </dialog>

  <!-- メモ -->
  <dialog id="memo-modal" class="modal">
    <form id="memo-form" method="dialog">
      <header class="modal-header">
        <h3>微光メモ</h3>
        <button type="button" class="btn-close" data-close>×</button>
      </header>
      <div class="modal-body">
        <input type="hidden" id="memo-target-id" />
        <label class="prop-field">タイトル
          <input type="text" id="memo-title" placeholder="例：この区画の制約" />
        </label>
        <label class="prop-field">内容
          <textarea id="memo-content" rows="3" placeholder="施工上の注意、要望など"></textarea>
        </label>
        <label class="prop-field">サイズ感
          <input type="text" id="memo-size" placeholder="例：W1200×D800×H2200" />
        </label>
        <label class="prop-field">色・仕様
          <input type="text" id="memo-colors" placeholder="例：床=#808080 壁=白" />
        </label>
        <label class="prop-field">寸法メモ
          <input type="text" id="memo-dimensions" placeholder="例：柱までの距離 450mm" />
        </label>
      </div>
      <footer class="modal-footer">
        <button type="button" class="btn btn-danger" id="memo-delete" hidden>削除</button>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close>キャンセル</button>
          <button type="submit" class="btn btn-primary">設置</button>
        </div>
      </footer>
    </form>
  </dialog>

  <script type="module" src="js/designer.js"></script>
</body>
</html>
